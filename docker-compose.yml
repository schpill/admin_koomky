version: '3.3'

services:
  # Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "6680:80"
      - "6443:443"
    volumes:
      - ./backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend:/var/www/html:ro
    depends_on:
      - api
      - frontend
    networks:
      - koomky-network

  # Laravel API
  api:
    build:
      context: .
      dockerfile: backend/docker/php/Dockerfile
    entrypoint: /var/www/html/docker/php/entrypoint.sh
    command: php-fpm
    volumes:
      - ./backend:/var/www/html
      - ./data:/var/www/data
    environment: &php-env
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=koomky
      - DB_USERNAME=koomky
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - MAIL_HOST=mailpit
      - MEILISEARCH_HOST=http://meilisearch:7700
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MCP_API_SECRET=${MCP_API_SECRET}
      - MCP_KOOMKY_URL=${MCP_KOOMKY_URL}
    depends_on:
      - postgres
      - redis
    networks:
      - koomky-network

  # Next.js Frontend
  frontend:
    build:
      context: .
      dockerfile: backend/docker/node/Dockerfile
    command: start-frontend
    user: "${DOCKER_UID}:${DOCKER_GID}"
    environment:
      - NEXT_PUBLIC_API_URL=/api/v1
      - NEXT_START_MODE=${NEXT_START_MODE:-dev}
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
      - frontend-next:/app/.next
    networks:
      - koomky-network

  # Database
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=koomky
      - POSTGRES_USER=koomky
      - POSTGRES_PASSWORD=secret
    volumes:
      - ../data/koomky/postgres:/var/lib/postgresql/data
      - ./backend/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U koomky -d koomky"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - koomky-network

  # Cache & Queues
  redis:
    image: redis:7-alpine
    volumes:
      - ../data/koomky/redis:/data
    networks:
      - koomky-network

  # Search
  meilisearch:
    image: getmeili/meilisearch:latest
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=masterKey
    volumes:
      - ../data/koomky/meilisearch:/meili_data
    networks:
      - koomky-network

  # Queue Worker
  queue-worker:
    build:
      context: .
      dockerfile: backend/docker/php/Dockerfile
    entrypoint: /var/www/html/docker/php/entrypoint.sh
    command: php artisan queue:work --queue=default,embeddings
    volumes:
      - ./backend:/var/www/html
    environment: *php-env
    depends_on:
      - redis
      - postgres
    networks:
      - koomky-network

  # MCP Server
  mcp:
    build:
      context: ./mcp
      dockerfile: Dockerfile
    environment:
      - MCP_TRANSPORT=sse
      - MCP_PORT=3100
      - MCP_API_SECRET=${MCP_API_SECRET}
      - MCP_KOOMKY_URL=${MCP_KOOMKY_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - api
    ports:
      - "3100:3100"
    networks:
      - koomky-network

  # Scheduler
  scheduler:
    build:
      context: .
      dockerfile: backend/docker/php/Dockerfile
    entrypoint: /var/www/html/docker/php/entrypoint.sh
    command: php artisan schedule:work
    volumes:
      - ./backend:/var/www/html
    environment: *php-env
    depends_on:
      - postgres
    networks:
      - koomky-network

  # Monitoring: Prometheus
  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./backend/docker/prometheus:/etc/prometheus:ro
    depends_on:
      - nginx
      - postgres-exporter
      - redis-exporter
      - node-exporter
    networks:
      - koomky-network

  # Monitoring: Grafana
  grafana:
    image: grafana/grafana:11.1.0
    user: "root"
    ports:
      - "3001:3000"
    volumes:
      - ../data/koomky/grafana:/var/lib/grafana
      - ./backend/docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./backend/docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - koomky-network

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      - DATA_SOURCE_NAME=postgresql://koomky:secret@postgres:5432/koomky?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      - postgres
    networks:
      - koomky-network

  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0
    environment:
      - REDIS_ADDR=redis://redis:6379
    ports:
      - "9121:9121"
    depends_on:
      - redis
    networks:
      - koomky-network

  node-exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - "--path.rootfs=/host"
    volumes:
      - /:/host:ro,rslave
    ports:
      - "9100:9100"
    networks:
      - koomky-network

  # Mail Testing
  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
    networks:
      - koomky-network

networks:
  koomky-network:
    driver: bridge

volumes:
  frontend-node-modules:
  frontend-next:

<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="500" fill="#f8f8f8"/>

  <!-- Main Title -->
  <text x="400" y="50" font-size="36" font-weight="bold" fill="#333" text-anchor="middle">Lead Scoring Rules</text>

  <!-- Table Header -->
  <text x="150" y="120" font-size="24" font-weight="bold" fill="#555">Rule</text>
  <text x="400" y="120" font-size="24" font-weight="bold" fill="#555">Score</text>
  <line x1="100" y1="135" x2="450" y2="135" stroke="#ccc" stroke-width="2"/>

  <!-- Table Rows -->
  <!-- Email Opened -->
  <text x="150" y="170" font-size="20" fill="#333">Email Opened</text>
  <text x="400" y="170" font-size="20" fill="#4CAF50" font-weight="bold">+5</text>
  <line x1="100" y1="185" x2="450" y2="185" stroke="#eee" stroke-width="1"/>

  <!-- Link Clicked -->
  <text x="150" y="220" font-size="20" fill="#333">Link Clicked</text>
  <text x="400" y="220" font-size="20" fill="#4CAF50" font-weight="bold">+10</text>
  <line x1="100" y1="235" x2="450" y2="235" stroke="#eee" stroke-width="1"/>

  <!-- Form Submitted -->
  <text x="150" y="270" font-size="20" fill="#333">Form Submitted</text>
  <text x="400" y="270" font-size="20" fill="#4CAF50" font-weight="bold">+20</text>
  <line x1="100" y1="285" x2="450" y2="285" stroke="#eee" stroke-width="1"/>

  <!-- Email Bounced -->
  <text x="150" y="320" font-size="20" fill="#333">Email Bounced</text>
  <text x="400" y="320" font-size="20" fill="#F44336" font-weight="bold">-20</text>
  <line x1="100" y1="335" x2="450" y2="335" stroke="#eee" stroke-width="1"/>

  <!-- Unsubscribed -->
  <text x="150" y="370" font-size="20" fill="#333">Unsubscribed</text>
  <text x="400" y="370" font-size="20" fill="#F44336" font-weight="bold">-30</text>
  <line x1="100" y1="385" x2="450" y2="385" stroke="#ccc" stroke-width="2"/>

  <!-- Score Gauge -->
  <text x="625" y="120" font-size="24" font-weight="bold" fill="#555" text-anchor="middle">Lead Score Gauge</text>

  <!-- Horizontal Gauge Bar -->
  <g transform="translate(475, 200)">
    <!-- Cold Segment -->
    <rect x="0" y="0" width="100" height="40" fill="#2196F3"/>
    <text x="50" y="-10" font-size="16" fill="#2196F3" font-weight="bold" text-anchor="middle">Cold</text>
    <text x="50" y="65" font-size="14" fill="#666" text-anchor="middle">0-10</text>

    <!-- Warm Segment -->
    <rect x="100" y="0" width="100" height="40" fill="#FFEB3B"/>
    <text x="150" y="-10" font-size="16" fill="#333" font-weight="bold" text-anchor="middle">Warm</text>
    <text x="150" y="65" font-size="14" fill="#666" text-anchor="middle">11-30</text>

    <!-- Hot Segment -->
    <rect x="200" y="0" width="100" height="40" fill="#FF9800"/>
    <text x="250" y="-10" font-size="16" fill="#FF9800" font-weight="bold" text-anchor="middle">Hot</text>
    <text x="250" y="65" font-size="14" fill="#666" text-anchor="middle">31+</text>

    <!-- Outline for the whole bar -->
    <rect x="0" y="0" width="300" height="40" fill="none" stroke="#ccc" stroke-width="2"/>
  </g>

</svg>
<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <style>
      .title { font-size: 48px; font-weight: bold; fill: #333; text-anchor: middle; }
      .box { fill: #E0F2F7; stroke: #A7D9EB; stroke-width: 2; rx: 15; ry: 15; }
      .text-label { font-size: 22px; fill: #333; text-anchor: middle; }
      .score-circle { fill: #4CAF50; stroke: #388E3C; stroke-width: 3; }
      .score-text { font-size: 60px; font-weight: bold; fill: #FFF; text-anchor: middle; }
      .arrow { stroke: #555; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .arrow-neg { stroke: #F44336; stroke-width: 3; fill: none; marker-end: url(#arrowhead-neg); }
      .output-box { fill: #E8F5E9; stroke: #A5D6A7; stroke-width: 2; rx: 15; ry: 15; }
      .output-text { font-size: 26px; font-weight: bold; fill: #2E7D32; text-anchor: middle; }
      .nurture-box { fill: #FFFDE7; stroke: #FFEB3B; stroke-width: 2; rx: 15; ry: 15; }
      .nurture-text { font-size: 26px; font-weight: bold; fill: #FBC02D; text-anchor: middle; }
      .icon-fill { fill: #2196F3; } /* For input icons */
      .icon-neg { fill: #F44336; } /* For negative icon */
      .icon-output { fill: #2E7D32; } /* For qualified icon */
      .icon-nurture { fill: #FBC02D; } /* For nurture icon */
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555" />
    </marker>
    <marker id="arrowhead-neg" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F44336" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="80" class="title">Lead Scoring Rules: Overview</text>

  <!-- Central Score -->
  <circle cx="600" cy="400" r="120" class="score-circle" />
  <text x="600" y="415" class="score-text">SCORE</text>

  <!-- Input Factors (left side) -->
  <!-- Demographics -->
  <g transform="translate(100, 200)">
    <rect x="0" y="0" width="200" height="90" class="box" />
    <g transform="translate(70, 15) scale(0.8)">
      <circle cx="20" cy="15" r="12" class="icon-fill" />
      <path d="M5 40 Q 20 25 35 40 H 5 Z" class="icon-fill" />
      <circle cx="45" cy="15" r="12" class="icon-fill" />
      <path d="M30 40 Q 45 25 60 40 H 30 Z" class="icon-fill" />
    </g>
    <text x="100" y="70" class="text-label">Demographics</text>
  </g>
  <line x1="300" y1="245" x2="485" y2="330" class="arrow" />

  <!-- Firmographics -->
  <g transform="translate(100, 350)">
    <rect x="0" y="0" width="200" height="90" class="box" />
    <g transform="translate(75, 15) scale(0.8)">
      <rect x="0" y="20" width="40" height="40" class="icon-fill" />
      <polygon points="0,20 20,0 40,20" class="icon-fill" />
      <rect x="5" y="25" width="10" height="15" fill="#FFF"/>
      <rect x="25" y="25" width="10" height="15" fill="#FFF"/>
    </g>
    <text x="100" y="70" class="text-label">Firmographics</text>
  </g>
  <line x1="300" y1="395" x2="480" y2="400" class="arrow" />

  <!-- Behavior -->
  <g transform="translate(100, 500)">
    <rect x="0" y="0" width="200" height="90" class="box" />
    <g transform="translate(75, 15) scale(0.8)">
      <path d="M30 0 L 10 40 L 20 40 L 20 60 L 40 60 L 40 40 L 50 40 Z" class="icon-fill" />
      <circle cx="25" cy="45" r="8" fill="#FFF"/>
    </g>
    <text x="100" y="70" class="text-label">Behavior</text>
  </g>
  <line x1="300" y1="545" x2="485" y2="470" class="arrow" />

  <!-- Engagement (right side, top) -->
  <g transform="translate(900, 200)">
    <rect x="0" y="0" width="200" height="90" class="box" />
    <g transform="translate(70, 15) scale(0.8)">
      <rect x="0" y="10" width="60" height="40" class="icon-fill" />
      <polygon points="0,10 30,35 60,10" fill="#FFF" />
    </g>
    <text x="100" y="70" class="text-label">Engagement</text>
  </g>
  <line x1="900" y1="245" x2="715" y2="330" class="arrow" />

  <!-- Negative Factors (right side, middle) -->
  <g transform="translate(900, 350)">
    <rect x="0" y="0" width="200" height="90" class="box" />
    <g transform="translate(75, 15) scale(0.8)">
      <rect x="10" y="25" width="40" height="10" class="icon-neg" />
    </g>
    <text x="100" y="70" class="text-label">Negative Factors</text>
  </g>
  <line x1="900" y1="395" x2="720" y2="400" class="arrow-neg" />

  <!-- Output / Next Steps -->
  <!-- Qualified Lead -->
  <g transform="translate(350, 650)">
    <rect x="0" y="0" width="220" height="90" class="output-box" />
    <g transform="translate(85, 20) scale(0.8)">
      <path d="M10 30 L 20 40 L 45 15 L 40 10 L 20 30 L 15 25 Z" class="icon-output" />
    </g>
    <text x="110" y="70" class="output-text">Qualified Lead</text>
  </g>
  <line x1="560" y1="480" x2="460" y2="650" class="arrow" />

  <!-- Nurturing Track -->
  <g transform="translate(630, 650)">
    <rect x="0" y="0" width="220" height="90" class="nurture-box" />
    <g transform="translate(90, 20) scale(0.8)">
      <path d="M25 5 Q 35 15 30 30 Q 20 40 10 30 Q 5 20 25 5 Z" class="icon-nurture" />
      <path d="M20 35 C 10 30 15 45 25 50 C 35 45 30 30 20 35 Z" class="icon-nurture" />
      <circle cx="20" cy="55" r="5" fill="#FBC02D"/>
    </g>
    <text x="110" y="70" class="nurture-text">Nurturing Track</text>
  </g>
  <line x1="640" y1="480" x2="740" y2="650" class="arrow" />

</svg>
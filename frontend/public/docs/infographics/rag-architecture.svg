<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <style>
      /* Node Styles */
      .actor { fill: #ffffff; stroke: #333; stroke-width: 2; border-radius: 8px; }
      .system-component { fill: #f0f8ff; stroke: #333; stroke-width: 2; border-radius: 8px; }
      .process { fill: #e0f2f7; stroke: #2a6f8b; stroke-width: 2; }
      .data-store { fill: #fff3e0; stroke: #d35400; stroke-width: 2; }
      .llm { fill: #e8f5e9; stroke: #4caf50; stroke-width: 2; }
      .input-output { fill: #fcfcfc; stroke: #555; stroke-width: 2; }

      /* Text Styles */
      .text-label { font-size: 16px; text-anchor: middle; fill: #333; }
      .subtitle { font-size: 20px; font-weight: bold; text-anchor: middle; fill: #444; }
      .title { font-size: 28px; font-weight: bold; text-anchor: middle; fill: #222; }
      .small-text { font-size: 12px; fill: #666; }

      /* Arrowhead definition */
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#555" />
      </marker>
      .arrow-line { stroke: #555; stroke-width: 2; marker-end: url(#arrowhead); }
    </style>
  </defs>

  <!-- Title -->
  <text x="600" y="50" class="title">RAG Architecture with CRM Integration</text>

  <!-- Overall RAG Pipeline Bounding Box -->
  <rect x="350" y="100" width="750" height="650" rx="15" ry="15" fill="none" stroke="#ccc" stroke-dasharray="5,5" stroke-width="1" />
  <text x="725" y="130" class="small-text" fill="#888">Retrieval Augmented Generation (RAG) Pipeline</text>

  <!-- Actor: User -->
  <rect x="50" y="180" width="120" height="60" rx="8" ry="8" class="actor" />
  <text x="110" y="215" class="text-label">User</text>

  <!-- System Component: CRM System (Input) -->
  <rect x="200" y="150" width="180" height="120" rx="8" ry="8" class="system-component" />
  <text x="290" y="190" class="subtitle">CRM System</text>
  <text x="290" y="220" class="small-text">Agent Interface, Chatbot, Portal</text>

  <!-- Input/Output: User Query -->
  <rect x="230" y="300" width="120" height="50" rx="8" ry="8" class="input-output" />
  <text x="290" y="330" class="text-label">User Query</text>

  <!-- Process: Query Embedder -->
  <rect x="420" y="300" width="150" height="60" rx="8" ry="8" class="process" />
  <text x="495" y="335" class="text-label">Query Embedder</text>
  <text x="495" y="355" class="small-text">(Vectorizes Query)</text>

  <!-- Data Store: Vector Database -->
  <rect x="650" y="270" width="220" height="100" rx="8" ry="8" class="data-store" />
  <text x="760" y="305" class="subtitle">Vector Database</text>
  <text x="760" y="330" class="small-text">(CRM Data, KB Articles, Docs)</text>

  <!-- Input/Output: Retrieved Context -->
  <rect x="920" y="300" width="150" height="60" rx="8" ry="8" class="input-output" />
  <text x="995" y="335" class="text-label">Retrieved Context</text>
  <text x="995" y="355" class="small-text">(Relevant Chunks)</text>

  <!-- Process: Prompt Generator -->
  <rect x="450" y="500" width="200" height="70" rx="8" ry="8" class="process" />
  <text x="550" y="530" class="text-label">Prompt Generator</text>
  <text x="550" y="550" class="small-text">Combines Query + Context</text>

  <!-- LLM: Large Language Model -->
  <rect x="700" y="480" width="200" height="120" rx="8" ry="8" class="llm" />
  <text x="800" y="520" class="subtitle">Large Language Model</text>
  <text x="800" y="550" class="small-text">(Generates Response)</text>

  <!-- Input/Output: Generated Response -->
  <rect x="950" y="500" width="150" height="60" rx="8" ry="8" class="input-output" />
  <text x="1025" y="535" class="text-label">Generated Response</text>

  <!-- System Component: CRM System (Output) -->
  <rect x="1050" y="150" width="180" height="120" rx="8" ry="8" class="system-component" />
  <text x="1140" y="190" class="subtitle">CRM System</text>
  <text x="1140" y="220" class="small-text">Display to User, Log Interaction</text>

  <!-- Data Store: CRM Data Sources -->
  <rect x="400" y="680" width="200" height="70" rx="8" ry="8" class="data-store" />
  <text x="500" y="710" class="subtitle">CRM Data Sources</text>
  <text x="500" y="730" class="small-text">Sales, Service, Marketing Data</text>


  <!-- Arrows (Data Flow) -->

  <!-- User to CRM -->
  <line x1="170" y1="210" x2="200" y2="210" class="arrow-line" />
  <text x="185" y="200" class="small-text">Input</text>

  <!-- CRM (input) to User Query -->
  <line x1="290" y1="270" x2="290" y2="300" class="arrow-line" />
  <text x="305" y="285" class="small-text">Request</text>

  <!-- User Query to Query Embedder -->
  <line x1="350" y1="325" x2="420" y2="325" class="arrow-line" />

  <!-- Query Embedder to Vector DB -->
  <line x1="570" y1="325" x2="650" y2="325" class="arrow-line" />
  <text x="610" y="315" class="small-text">Vectorized Query</text>

  <!-- Vector DB to Retrieved Context -->
  <line x1="870" y1="325" x2="920" y2="325" class="arrow-line" />
  <text x="895" y="315" class="small-text">Top-K Results</text>

  <!-- User Query (original) to Prompt Generator -->
  <polyline points="290,350 290,470 450,470 450,520" class="arrow-line" fill="none" />
  <text x="350" y="410" class="small-text">Original Query</text>

  <!-- Retrieved Context to Prompt Generator -->
  <polyline points="995,360 995,470 650,470 650,535" class="arrow-line" fill="none" />
  <text x="800" y="400" class="small-text">Context</text>

  <!-- Prompt Generator to LLM -->
  <line x1="650" y1="535" x2="700" y2="535" class="arrow-line" />
  <text x="675" y="525" class="small-text">Augmented Prompt</text>

  <!-- LLM to Generated Response -->
  <line x1="900" y1="535" x2="950" y2="535" class="arrow-line" />

  <!-- Generated Response to CRM (output) -->
  <polyline points="1025,500 1025,210 1050,210" class="arrow-line" fill="none" />
  <text x="1010" y="350" class="small-text">Response</text>
  <text x="1090" y="200" class="small-text">Display/Log</text>

  <!-- CRM Data Sources to Vector DB (Ingestion) -->
  <polyline points="500,680 500,400 760,400 760,370" class="arrow-line" fill="none" />
  <text x="590" y="410" class="small-text">Index & Embed Data</text>

</svg>
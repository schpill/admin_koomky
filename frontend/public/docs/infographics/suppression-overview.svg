<svg width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7"
            refX="0" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>

  <!-- Styles -->
  <style>
    .source-box {
      fill: #e0f2f7;
      stroke: #007bff;
      stroke-width: 2;
      rx: 10;
    }
    .suppression-shield {
      fill: #a8dadc;
      stroke: #1d3557;
      stroke-width: 3;
    }
    .protection-box {
      fill: #d4edda;
      stroke: #28a745;
      stroke-width: 2;
      rx: 10;
    }
    .arrow {
      stroke: #333;
      stroke-width: 2;
      fill: none;
      marker-end: url(#arrowhead);
    }
    .label-text {
        font-family: Arial, sans-serif;
        font-size: 20px;
        fill: #333;
        text-anchor: middle;
        dominant-baseline: middle;
    }
    .shield-text {
        font-family: Arial, sans-serif;
        font-size: 25px;
        font-weight: bold;
        fill: #1d3557;
        text-anchor: middle;
        dominant-baseline: middle;
    }
  </style>

  <!-- Source 1: Hard Bounce (auto) -->
  <rect x="50" y="100" width="200" height="60" class="source-box"/>
  <text x="150" y="130" class="label-text">Hard Bounce (auto)</text>

  <!-- Source 2: Manual Unsubscribe -->
  <rect x="50" y="220" width="200" height="60" class="source-box"/>
  <text x="150" y="250" class="label-text">Manual Unsubscribe</text>

  <!-- Source 3: Admin Import CSV -->
  <rect x="50" y="340" width="200" height="60" class="source-box"/>
  <text x="150" y="370" class="label-text">Admin Import CSV</text>

  <!-- Suppression List Shield -->
  <path d="M 450,180 L 520,200 V 330 C 520,360 450,370 450,370 C 450,370 380,360 380,330 V 200 L 450,180 Z" class="suppression-shield"/>
  <text x="450" y="260" class="shield-text">Suppression</text>
  <text x="450" y="295" class="shield-text">List</text>

  <!-- Protection Element: Protects Future Sends -->
  <rect x="600" y="220" width="180" height="60" class="protection-box"/>
  <text x="690" y="240" class="label-text">Protects</text>
  <text x="690" y="265" class="label-text">Future Sends</text>

  <!-- Arrows -->
  <!-- Source 1 to Shield -->
  <path d="M 250,130 L 380,220" class="arrow"/>
  <!-- Source 2 to Shield -->
  <path d="M 250,250 L 380,275" class="arrow"/>
  <!-- Source 3 to Shield -->
  <path d="M 250,370 L 380,330" class="arrow"/>

  <!-- Shield to Protection -->
  <path d="M 520,275 L 600,250" class="arrow"/>
</svg>
<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#007bff" />
    </marker>
  </defs>

  <!-- Swimlanes -->
  <g class="swimlanes">
    <rect x="0" y="0" width="1200" height="200" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
    <text x="600" y="30" text-anchor="middle" font-size="20px" font-weight="bold" fill="#6c757d">Marketing</text>

    <rect x="0" y="200" width="1200" height="300" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
    <text x="600" y="230" text-anchor="middle" font-size="20px" font-weight="bold" fill="#6c757d">Sales</text>

    <rect x="0" y="500" width="1200" height="300" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
    <text x="600" y="530" text-anchor="middle" font-size="20px" font-weight="bold" fill="#6c757d">Operations</text>
  </g>

  <!-- Workflow Nodes -->
  <g class="workflow-nodes">
    <!-- 1. Start: New Lead Captured (Marketing) -->
    <ellipse cx="150" cy="100" rx="70" ry="40" fill="#ffffff" stroke="#007bff" stroke-width="2"/>
    <text x="150" y="95" text-anchor="middle" font-size="16px" fill="#343a40">
      <tspan x="150" dy="0">New Lead</tspan>
      <tspan x="150" dy="20">Captured</tspan>
    </text>

    <!-- 2. Process: Lead Qualification (Sales) -->
    <rect x="100" y="270" width="150" height="60" rx="8" ry="8" fill="#ffffff" stroke="#007bff" stroke-width="2"/>
    <text x="175" y="305" text-anchor="middle" font-size="16px" fill="#343a40">Lead Qualification</text>

    <!-- 3. Decision: Is Lead Qualified? (Sales) -->
    <polygon points="175,390 250,440 175,490 100,440" fill="#ffffff" stroke="#007bff" stroke-width="2"/>
    <text x="175" y="430" text-anchor="middle" font-size="16px" fill="#343a40">
      <tspan x="175" dy="0">Lead</tspan>
      <tspan x="175" dy="18">Qualified?</tspan>
    </text>

    <!-- 4. Process (NO path): Nurture Lead (Marketing) -->
    <rect x="350" y="70" width="150" height="60" rx="8" ry="8" fill="#ffffff" stroke="#007bff" stroke-width="2"/>
    <text x="425" y="105" text-anchor="middle" font-size="16px" fill="#343a40">Nurture Lead</text>

    <!-- 5. Process (YES path): Create Opportunity (Sales) -->
    <rect x="350" y="270" width="150" height="60" rx="8" ry="8" fill="#ffffff" stroke="#007bff" stroke-width="2"/>
    <text x="425" y="305" text-anchor="middle" font-size="16px" fill="#343a40">Create Opportunity</text>

    <!-- 6. Process: Discovery (Sales) -->
    <rect x="550" y="270" width="150" height="60" rx="8" ry="8" fill="#ffffff" stroke="#007bff" stroke-width="2"/>
    <text x="625" y="305" text-anchor="middle" font-size="16px" fill="#343a40">Discovery</text>

    <!-- 7. Process: Proposal (Sales) -->
    <rect x="750" y="270" width="150" height="60" rx="8" ry="8" fill="#ffffff" stroke="#007bff" stroke-width="2"/>
    <text x="825" y="305" text-anchor="middle" font-size="16px" fill="#343a40">Proposal</text>

    <!-- 8. Decision: Proposal Accepted? (Sales) -->
    <polygon points="825,390 900,440 825,490 750,440" fill="#ffffff" stroke="#007bff" stroke-width="2"/>
    <text x="825" y="430" text-anchor="middle" font-size="16px" fill="#343a40">
      <tspan x="825" dy="0">Proposal</tspan>
      <tspan x="825" dy="18">Accepted?</tspan>
    </text>

    <!-- 9. Process (NO path): Revise Proposal (Sales) -->
    <rect x="950" y="370" width="150" height="60" rx="8" ry="8" fill="#ffffff" stroke="#007bff" stroke-width="2"/>
    <text x="1025" y="405" text-anchor="middle" font-size="16px" fill="#343a40">Revise Proposal</text>

    <!-- 10. Process (YES path): Opportunity Won (Sales) -->
    <rect x="950" y="270" width="150" height="60" rx="8" ry="8" fill="#ffffff" stroke="#007bff" stroke-width="2"/>
    <text x="1025" y="305" text-anchor="middle" font-size="16px" fill="#343a40">Opportunity Won</text>

    <!-- 11. End: Customer Onboarded (Operations) -->
    <ellipse cx="1025" cy="600" rx="70" ry="40" fill="#ffffff" stroke="#007bff" stroke-width="2"/>
    <text x="1025" y="590" text-anchor="middle" font-size="16px" fill="#343a40">
      <tspan x="1025" dy="0">Customer</tspan>
      <tspan x="1025" dy="20">Onboarded</tspan>
    </text>
  </g>

  <!-- Connectors -->
  <g class="workflow-connections">
    <!-- 1. New Lead Captured -> Lead Qualification -->
    <path d="M 150 140 L 150 270" stroke="#007bff" stroke-width="2" fill="none" marker-end="url(#arrow)" />

    <!-- 2. Lead Qualification -> Is Lead Qualified? -->
    <path d="M 175 330 L 175 390" stroke="#007bff" stroke-width="2" fill="none" marker-end="url(#arrow)" />

    <!-- 3. Is Lead Qualified? (NO) -> Nurture Lead -->
    <path d="M 100 440 L 50 440 L 50 100 L 350 100" stroke="#007bff" stroke-width="2" fill="none" marker-end="url(#arrow)" />
    <text x="80" y="430" font-size="14px" fill="#343a40" font-weight="bold">No</text>
    
    <!-- Nurture Lead (exit to unknown/archive) - simple line off to the right -->
    <path d="M 500 100 L 550 100" stroke="#007bff" stroke-width="2" fill="none" marker-end="url(#arrow)" stroke-dasharray="5,5"/>
    <text x="525" y="90" font-size="12px" fill="#6c757d" text-anchor="middle">Archive / Re-engage</text>

    <!-- 4. Is Lead Qualified? (YES) -> Create Opportunity -->
    <path d="M 250 440 L 300 440 L 300 300 L 350 300" stroke="#007bff" stroke-width="2" fill="none" marker-end="url(#arrow)" />
    <text x="275" y="430" font-size="14px" fill="#343a40" font-weight="bold">Yes</text>

    <!-- 5. Create Opportunity -> Discovery -->
    <path d="M 500 300 L 550 300" stroke="#007bff" stroke-width="2" fill="none" marker-end="url(#arrow)" />

    <!-- 6. Discovery -> Proposal -->
    <path d="M 700 300 L 750 300" stroke="#007bff" stroke-width="2" fill="none" marker-end="url(#arrow)" />

    <!-- 7. Proposal -> Proposal Accepted? -->
    <path d="M 825 330 L 825 390" stroke="#007bff" stroke-width="2" fill="none" marker-end="url(#arrow)" />

    <!-- 8. Proposal Accepted? (NO) -> Revise Proposal -->
    <path d="M 750 440 L 725 440 L 725 400 L 950 400" stroke="#007bff" stroke-width="2" fill="none" marker-end="url(#arrow)" />
    <text x="770" y="430" font-size="14px" fill="#343a40" font-weight="bold">No</text>

    <!-- 9. Revise Proposal -> Proposal (loop back) -->
    <path d="M 1100 400 L 1150 400 L 1150 250 L 825 250 L 825 270" stroke="#007bff" stroke-width="2" fill="none" marker-end="url(#arrow)" />

    <!-- 10. Proposal Accepted? (YES) -> Opportunity Won -->
    <path d="M 900 440 L 925 440 L 925 300 L 950 300" stroke="#007bff" stroke-width="2" fill="none" marker-end="url(#arrow)" />
    <text x="925" y="430" font-size="14px" fill="#343a40" font-weight="bold">Yes</text>

    <!-- 11. Opportunity Won -> Customer Onboarded -->
    <path d="M 1025 330 L 1025 560" stroke="#007bff" stroke-width="2" fill="none" marker-end="url(#arrow)" />
  </g>
</svg>
<svg width="1000" height="850" viewBox="0 0 1000 850" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif" font-size="14" style="border: 1px solid #ccc; background-color: #f9f9f9;">
    <title>CRM Lead to Customer Workflow</title>
    <desc>A standard workflow diagram illustrating the progression of a lead through qualification, opportunity management, and conversion into an active customer within a CRM system.</desc>

    <defs>
        <!-- Arrowhead marker definition -->
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
        </marker>

        <!-- Common styles for shapes -->
        <style>
            .start-end {
                fill: #d4edda; /* Light green */
                stroke: #28a745; /* Darker green */
                stroke-width: 2;
            }
            .process {
                fill: #cfe2f3; /* Light blue */
                stroke: #007bff; /* Darker blue */
                stroke-width: 2;
            }
            .decision {
                fill: #fff3cd; /* Light yellow */
                stroke: #ffc107; /* Darker yellow */
                stroke-width: 2;
            }
            .termination {
                fill: #f8d7da; /* Light red */
                stroke: #dc3545; /* Darker red */
                stroke-width: 2;
            }
            .line {
                stroke: #333;
                stroke-width: 2;
                marker-end: url(#arrowhead);
                fill: none;
            }
            .text-main {
                fill: #333;
                font-size: 15px;
                font-weight: bold;
            }
            .text-label {
                fill: #555;
                font-size: 12px;
            }
            .diagram-title {
                font-size: 28px;
                font-weight: bold;
                fill: #333;
            }
        </style>
    </defs>

    <!-- Title of the Infographic -->
    <text x="500" y="50" text-anchor="middle" class="diagram-title">CRM: Lead to Customer Workflow</text>
    <text x="500" y="85" text-anchor="middle" font-size="16" fill="#666">Standardized Process for Sales and Account Management</text>


    <!-- Workflow Elements -->

    <!-- 1. Start: New Lead Captured -->
    <ellipse cx="200" cy="150" rx="100" ry="30" class="start-end"/>
    <text x="200" y="155" text-anchor="middle" class="text-main">New Lead Captured</text>

    <!-- 2. Process: Lead Qualification -->
    <rect x="100" y="230" width="200" height="60" rx="5" ry="5" class="process"/>
    <text x="200" y="265" text-anchor="middle" class="text-main">Lead Qualification</text>

    <!-- 3. Decision: Is Lead Qualified? -->
    <rect x="150" y="340" width="100" height="100" transform="rotate(45 200 390)" class="decision"/>
    <text x="200" y="390" text-anchor="middle" class="text-main">Is Lead</text>
    <text x="200" y="410" text-anchor="middle" class="text-main">Qualified?</text>

    <!-- Path for "No" from Lead Qualification -->
    <rect x="50" y="520" width="200" height="60" rx="5" ry="5" class="termination"/>
    <text x="150" y="555" text-anchor="middle" class="text-main">Archive Lead</text>

    <ellipse cx="150" cy="640" rx="80" ry="30" class="termination"/>
    <text x="150" y="645" text-anchor="middle" class="text-main">Lead Archived (END)</text>

    <!-- 4. Process: Convert to Opportunity -->
    <rect x="350" y="230" width="200" height="60" rx="5" ry="5" class="process"/>
    <text x="450" y="265" text-anchor="middle" class="text-main">Convert to Opportunity</text>

    <!-- 5. Process: Opportunity Nurturing/Sales -->
    <rect x="350" y="340" width="200" height="60" rx="5" ry="5" class="process"/>
    <text x="450" y="375" text-anchor="middle" class="text-main">Opportunity Nurturing</text>
    <text x="450" y="395" text-anchor="middle" class="text-main">&amp; Sales Process</text>

    <!-- 6. Decision: Is Opportunity Won? -->
    <rect x="400" y="470" width="100" height="100" transform="rotate(45 450 520)" class="decision"/>
    <text x="450" y="520" text-anchor="middle" class="text-main">Is Opportunity</text>
    <text x="450" y="540" text-anchor="middle" class="text-main">Won?</text>

    <!-- Path for "No" from Opportunity Won -->
    <rect x="650" y="520" width="200" height="60" rx="5" ry="5" class="termination"/>
    <text x="750" y="555" text-anchor="middle" class="text-main">Close Opportunity Lost</text>

    <ellipse cx="750" cy="640" rx="80" ry="30" class="termination"/>
    <text x="750" y="645" text-anchor="middle" class="text-main">Opp. Closed (END)</text>

    <!-- 7. Process: Convert to Customer Account -->
    <rect x="350" y="600" width="200" height="60" rx="5" ry="5" class="process"/>
    <text x="450" y="635" text-anchor="middle" class="text-main">Convert to Customer</text>
    <text x="450" y="655" text-anchor="middle" class="text-main">Account</text>

    <!-- 8. Process: Customer Onboarding -->
    <rect x="350" y="700" width="200" height="60" rx="5" ry="5" class="process"/>
    <text x="450" y="735" text-anchor="middle" class="text-main">Customer Onboarding</text>
    <text x="450" y="755" text-anchor="middle" class="text-main">&amp; Handoff</text>

    <!-- 9. End: Active Customer -->
    <ellipse cx="450" cy="810" rx="100" ry="30" class="start-end"/>
    <text x="450" y="815" text-anchor="middle" class="text-main">Active Customer (END)</text>

    <!-- Workflow Lines and Labels -->

    <!-- Lead Flow -->
    <line x1="200" y1="180" x2="200" y2="230" class="line"/>
    <line x1="200" y1="290" x2="200" y2="340" class="line"/>

    <!-- Qualified? Decision -->
    <line x1="200" y1="440" x2="200" y2="470" class="line"/>
    <polyline points="200,440 200,470 150,470 150,520" class="line"/>
    <text x="180" y="455" class="text-label">No</text>

    <!-- Archive Lead Path -->
    <line x1="150" y1="580" x2="150" y2="610" class="line"/>
    <polyline points="150,610 150,610 150,610 150,610" class="line"/> <!-- Dummy line for arrow alignment -->

    <!-- Yes Path from Qualified? -->
    <line x1="250" y1="390" x2="350" y2="390" class="line"/>
    <polyline points="250,390 350,390 350,390 350,390" class="line"/> <!-- Dummy line for arrow alignment -->
    <line x1="250" y1="390" x2="350" y2="390" class="line"/>
    <text x="295" y="380" class="text-label">Yes</text>
    <polyline points="350,390 350,260 450,260" class="line"/>
    <line x1="450" y1="290" x2="450" y2="340" class="line"/>

    <!-- Opportunity Flow -->
    <line x1="450" y1="400" x2="450" y2="470" class="line"/>

    <!-- Won? Decision -->
    <line x1="450" y1="570" x2="450" y2="600" class="line"/>
    <text x="430" y="585" class="text-label">Yes</text>

    <!-- Close Lost Path -->
    <line x1="550" y1="520" x2="650" y2="520" class="line"/>
    <polyline points="550,520 650,520 650,520 650,520" class="line"/> <!-- Dummy line for arrow alignment -->
    <text x="590" y="510" class="text-label">No</text>
    <line x1="750" y1="580" x2="750" y2="610" class="line"/>
    <polyline points="750,610 750,610 750,610 750,610" class="line"/> <!-- Dummy line for arrow alignment -->

    <!-- Customer Flow -->
    <line x1="450" y1="660" x2="450" y2="700" class="line"/>
    <line x1="450" y1="760" x2="450" y2="780" class="line"/>

</svg>

<svg width="800" height="1000" viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <style>
      .funnel-stage-bg { fill: #ffffff; stroke: #dcdcdc; stroke-width: 1; }
      .funnel-label { fill: #2c3e50; font-size: 20px; font-weight: bold; }
      .funnel-detail { fill: #7f8c8d; font-size: 15px; }
      .arrow { fill: none; stroke: #95a5a6; stroke-width: 2; marker-end: url(#arrowhead); }
      .icon-fill { fill: #3498db; }
      .crm-title { fill: #2c3e50; font-size: 30px; font-weight: bold; }
      .crm-subtitle { fill: #7f8c8d; font-size: 18px; }
      .crm-box-bg { fill: #ecf0f1; stroke: #bdc3c7; stroke-width: 1; }
      .crm-box-header { fill: #3498db; }
      .crm-box-text { fill: #fff; font-size: 14px; }
      .crm-box-line { fill: #95a5a6; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#95a5a6" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="50" y="70" class="crm-title">Campaign Funnel with CRM Flow</text>
  <text x="50" y="105" class="crm-subtitle">From Lead Generation to Customer Retention</text>

  <!-- CRM icon next to title -->
  <g transform="translate(10, 30) scale(1.5)">
    <!-- Simple Database Icon -->
    <ellipse cx="15" cy="5" rx="10" ry="5" fill="#3498db" />
    <path d="M5 5 L5 15 A10 5 0 0 0 15 20 A10 5 0 0 0 25 15 L25 5" fill="#3498db" />
    <ellipse cx="15" cy="20" rx="10" ry="5" fill="#3498db" opacity="0.8"/>
  </g>


  <!-- Funnel Stages & Icons -->

  <!-- Stage 1: Awareness & Leads -->
  <path d="M150 150 L650 150 L575 270 L225 270 Z" class="funnel-stage-bg" />
  <g transform="translate(210, 185)"> <!-- Adjusted for icon vertical centering with text -->
    <!-- Megaphone Icon -->
    <path d="M5 10 L15 10 L15 0 C15 0 20 0 20 5 L20 15 C20 20 15 20 15 20 L15 10 L5 10 L5 20 C5 20 0 20 0 15 L0 5 C0 0 5 0 5 0 Z" class="icon-fill" transform="scale(0.8) translate(5, -5)"/>
  </g>
  <text x="250" y="200" text-anchor="start" class="funnel-label">Awareness & Leads</text>
  <text x="250" y="225" text-anchor="start" class="funnel-detail">Reach, Marketing Campaigns, CRM Entry</text>

  <!-- Arrow 1 -->
  <line x1="400" y1="275" x2="400" y2="315" class="arrow" />

  <!-- Stage 2: Engagement & MQLs -->
  <path d="M225 320 L575 320 L500 440 L300 440 Z" class="funnel-stage-bg" />
  <g transform="translate(210, 355)"> <!-- Adjusted for icon vertical centering with text -->
    <!-- Chat Bubble Icon -->
    <path d="M10 0 C4.477 0 0 4.477 0 10 C0 15.523 4.477 20 10 20 L15 20 L20 25 L20 20 L25 20 C30.523 20 35 15.523 35 10 C35 4.477 30.523 0 25 0 Z" class="icon-fill" transform="scale(0.7) translate(-10, -5)"/>
  </g>
  <text x="250" y="370" text-anchor="start" class="funnel-label">Engagement & MQLs</text>
  <text x="250" y="395" text-anchor="start" class="funnel-detail">Nurturing, Lead Scoring, Prospect Activities</text>

  <!-- Arrow 2 -->
  <line x1="400" y1="445" x2="400" y2="485" class="arrow" />

  <!-- Stage 3: Consideration & SQLs -->
  <path d="M300 490 L500 490 L450 610 L350 610 Z" class="funnel-stage-bg" />
  <g transform="translate(210, 525)"> <!-- Adjusted for icon vertical centering with text -->
    <!-- Magnifying Glass Icon -->
    <circle cx="0" cy="0" r="10" stroke-width="3" stroke="#3498db" fill="none" transform="scale(0.8) translate(-10, 0)"/>
    <line x1="8" y1="8" x2="18" y2="18" stroke="#3498db" stroke-width="3" stroke-linecap="round" transform="scale(0.8) translate(-10, 0)"/>
  </g>
  <text x="250" y="540" text-anchor="start" class="funnel-label">Consideration & SQLs</text>
  <text x="250" y="565" text-anchor="start" class="funnel-detail">Product Demos, Sales Calls, Opportunity Creation</text>

  <!-- Arrow 3 -->
  <line x1="400" y1="615" x2="400" y2="655" class="arrow" />

  <!-- Stage 4: Decision & Opportunities -->
  <path d="M350 660 L450 660 L425 780 L375 780 Z" class="funnel-stage-bg" />
  <g transform="translate(210, 695)"> <!-- Adjusted for icon vertical centering with text -->
    <!-- Checkmark Icon -->
    <path d="M5 12 L12 19 L25 5 L22 2 L12 12 L8 8 Z" class="icon-fill" transform="scale(0.8) translate(-15, -5)"/>
  </g>
  <text x="250" y="710" text-anchor="start" class="funnel-label">Decision & Opportunities</text>
  <text x="250" y="735" text-anchor="start" class="funnel-detail">Proposals, Negotiations, Deal Closing</text>

  <!-- Arrow 4 (connecting funnel to post-funnel) -->
  <line x1="400" y1="785" x2="400" y2="825" class="arrow" />

  <!-- Stage 5: Conversion & Customers (Post-Funnel / Bottom) -->
  <rect x="300" y="830" width="200" height="70" rx="10" ry="10" fill="#2ecc71" stroke="#27ae60"/>
  <g transform="translate(315, 850)"> <!-- Adjusted for icon vertical centering with text -->
    <!-- Star Icon for Conversion -->
    <path d="M12 0 L15.5 8 L24 9 L18 14 L19.5 22 L12 17 L4.5 22 L6 14 L0 9 L8.5 8 Z" fill="#f1c40f" transform="scale(0.8) translate(-10, -5)"/>
  </g>
  <text x="350" y="860" text-anchor="start" class="funnel-label" fill="#fff">Conversion & Customers</text>
  <text x="350" y="885" text-anchor="start" class="funnel-detail" fill="#fff">Closed-Won, Onboarding, Advocacy</text>


  <!-- CRM System Callout -->
  <g transform="translate(600, 180)">
    <rect x="0" y="0" width="180" height="150" rx="10" ry="10" class="crm-box-bg"/>
    <rect x="15" y="20" width="150" height="25" rx="5" ry="5" class="crm-box-header"/>
    <text x="90" y="38" text-anchor="middle" class="crm-box-text">CRM System</text>
    <!-- Database icon simplified -->
    <ellipse cx="90" cy="65" rx="30" ry="10" fill="#95a5a6"/>
    <path d="M60 65 L60 100 A30 10 0 0 0 90 110 A30 10 0 0 0 120 100 L120 65" fill="#95a5a6"/>
    <ellipse cx="90" cy="110" rx="30" ry="10" fill="#95a5a6" opacity="0.8"/>
    <text x="90" y="135" text-anchor="middle" fill="#7f8c8d" font-size="12px">Centralized Data & Automation</text>
  </g>

</svg>
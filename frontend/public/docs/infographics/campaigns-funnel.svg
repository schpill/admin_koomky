<svg width="900" height="950" viewBox="0 0 900 950" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif" xml:space="preserve">
  <style>
    /* General Styles */
    .bg-light { fill: #f8f9fa; }
    .stroke-dark { stroke: #adb5bd; stroke-width: 1; }
    .text-dark { fill: #343a40; }
    .text-muted { fill: #6c757d; font-size: 12px; }
    .text-small { font-size: 12px; }
    .text-medium { font-size: 14px; }
    .text-large { font-size: 18px; font-weight: bold; }
    .text-title { font-size: 24px; font-weight: bold; fill: #212529; }
    .connector-line { stroke: #495057; stroke-width: 2; fill: none; }
    .arrow-head { fill: #495057; }

    /* Funnel Specific Styles */
    .funnel-segment { stroke: #ced4da; stroke-width: 1; }
    .funnel-awareness { fill: #e6f7ff; } /* Light Blue */
    .funnel-lead { fill: #d4edda; }      /* Light Green */
    .funnel-opportunity { fill: #fff3cd; } /* Light Yellow */
    .funnel-customer { fill: #f8d7da; }   /* Light Red/Pink */
    .funnel-advocacy { fill: #e0f7fa; }   /* Very Light Blue */

    .funnel-text-label { font-size: 16px; font-weight: bold; fill: #212529; }
    .funnel-text-crm { font-size: 13px; font-weight: bold; fill: #495057; }
    .funnel-text-desc { font-size: 12px; fill: #6c757d; }

    /* CRM Box Styles */
    .crm-box { fill: #ffffff; stroke: #007bff; stroke-width: 2; border-radius: 5px; }
    .crm-box-title { font-size: 15px; font-weight: bold; fill: #007bff; }
    .crm-box-content { font-size: 12px; fill: #343a40; }
    .crm-box-bg { fill: #f0f8ff; } /* Lightest blue for the CRM box background */

    /* Legend Styles */
    .legend-box { stroke: #ced4da; stroke-width: 1; }
    .legend-text { font-size: 13px; fill: #343a40; }
  </style>

  <defs>
    <!-- Arrowhead Marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow-head" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="50" text-anchor="middle" class="text-title">Campaign Funnel and CRM Stages</text>
  <text x="450" y="80" text-anchor="middle" class="text-muted">Understanding the Customer Journey from Awareness to Advocacy</text>

  <!-- Overall Infographic Container (for clarity in structure) -->
  <g transform="translate(0, 100)">

    <!-- Funnel Segments -->
    <!-- Stage 1: Awareness & Discovery (Top of Funnel - ToFu) -->
    <polygon points="100,0 800,0 700,100 200,100" class="funnel-segment funnel-awareness"/>
    <text x="450" y="30" text-anchor="middle" class="funnel-text-label">1. AWARENESS and DISCOVERY (TOFU)</text>
    <text x="450" y="55" text-anchor="middle" class="funnel-text-desc">Attract broad audience interest. Initial contact with brand.</text>
    <text x="450" y="75" text-anchor="middle" class="funnel-text-crm">CRM Focus: Unknown Visitors, Leads (Initial Capture)</text>

    <!-- Stage 2: Lead Generation & Nurturing (Middle of Funnel - MoFu) -->
    <polygon points="200,120 700,120 620,220 280,220" class="funnel-segment funnel-lead"/>
    <text x="450" y="150" text-anchor="middle" class="funnel-text-label">2. LEAD GENERATION and NURTURING (MOFU)</text>
    <text x="450" y="175" text-anchor="middle" class="funnel-text-desc">Convert visitors to identifiable leads. Build engagement.</text>
    <text x="450" y="195" text-anchor="middle" class="funnel-text-crm">CRM Focus: Leads (MQLs, SALs), Contacts</text>

    <!-- Stage 3: Opportunity Management & Qualification (Middle/Bottom of Funnel - MoFu/BoFu) -->
    <polygon points="280,240 620,240 560,340 340,340" class="funnel-segment funnel-opportunity"/>
    <text x="450" y="270" text-anchor="middle" class="funnel-text-label">3. OPPORTUNITY MANAGEMENT (MOFU/BOFU)</text>
    <text x="450" y="295" text-anchor="middle" class="funnel-text-desc">Qualify leads, identify needs, propose solutions.</text>
    <text x="450" y="315" text-anchor="middle" class="funnel-text-crm">CRM Focus: Opportunities (Stages: Qualification, Proposal, Negotiation)</text>

    <!-- Stage 4: Conversion & Closure (Bottom of Funnel - BoFu) -->
    <polygon points="340,360 560,360 520,460 380,460" class="funnel-segment funnel-customer"/>
    <text x="450" y="390" text-anchor="middle" class="funnel-text-label">4. CONVERSION and CLOSURE (BOFU)</text>
    <text x="450" y="415" text-anchor="middle" class="funnel-text-desc">Secure the sale, sign contracts, onboard new customers.</text>
    <text x="450" y="435" text-anchor="middle" class="funnel-text-crm">CRM Focus: Opportunities (Closed Won), Accounts, Contacts (Customer Status)</text>

    <!-- Stage 5: Retention & Advocacy (Post-Funnel) -->
    <polygon points="380,480 520,480 500,580 400,580" class="funnel-segment funnel-advocacy"/>
    <text x="450" y="510" text-anchor="middle" class="funnel-text-label">5. RETENTION and ADVOCACY (POST-FUNNEL)</text>
    <text x="450" y="535" text-anchor="middle" class="funnel-text-desc">Ensure customer satisfaction, encourage repeat business and referrals.</text>
    <text x="450" y="555" text-anchor="middle" class="funnel-text-crm">CRM Focus: Accounts, Cases, Upsell/Cross-sell Opportunities, Customer Success</text>

    <!-- Downward Flow Arrows -->
    <path d="M450,105 L450,115" class="connector-line" marker-end="url(#arrowhead)"/>
    <path d="M450,225 L450,235" class="connector-line" marker-end="url(#arrowhead)"/>
    <path d="M450,345 L450,355" class="connector-line" marker-end="url(#arrowhead)"/>
    <path d="M450,465 L450,475" class="connector-line" marker-end="url(#arrowhead)"/>

    <!-- CRM Integration Boxes -->
    <!-- CRM Box 1: Awareness -->
    <rect x="20" y="10" width="160" height="80" rx="5" ry="5" class="crm-box-bg"/>
    <rect x="20" y="10" width="160" height="80" rx="5" ry="5" class="crm-box"/>
    <text x="100" y="30" text-anchor="middle" class="crm-box-title">CRM System Entry</text>
    <text x="100" y="50" text-anchor="middle" class="crm-box-content">Website tracking</text>
    <text x="100" y="65" text-anchor="middle" class="crm-box-content">Initial Lead capture forms</text>
    <text x="100" y="80" text-anchor="middle" class="crm-box-content">Visitor ID</text>
    <path d="M180,50 L200,50" class="connector-line" marker-end="url(#arrowhead)"/>

    <!-- CRM Box 2: Lead Gen -->
    <rect x="20" y="130" width="160" height="80" rx="5" ry="5" class="crm-box-bg"/>
    <rect x="20" y="130" width="160" height="80" rx="5" ry="5" class="crm-box"/>
    <text x="100" y="150" text-anchor="middle" class="crm-box-title">Lead Object</text>
    <text x="100" y="170" text-anchor="middle" class="crm-box-content">Status: New, Working, Nurturing</text>
    <text x="100" y="185" text-anchor="middle" class="crm-box-content">Lead Source, Score</text>
    <text x="100" y="200" text-anchor="middle" class="crm-box-content">Conversion to Contact/Account</text>
    <path d="M180,170 L200,170" class="connector-line" marker-end="url(#arrowhead)"/>

    <!-- CRM Box 3: Opportunity -->
    <rect x="20" y="250" width="160" height="80" rx="5" ry="5" class="crm-box-bg"/>
    <rect x="20" y="250" width="160" height="80" rx="5" ry="5" class="crm-box"/>
    <text x="100" y="270" text-anchor="middle" class="crm-box-title">Opportunity Object</text>
    <text x="100" y="290" text-anchor="middle" class="crm-box-content">Stages: Qual, Needs, Proposal</text>
    <text x="100" y="305" text-anchor="middle" class="crm-box-content">Amount, Close Date</text>
    <text x="100" y="320" text-anchor="middle" class="crm-box-content">Associated Account/Contact</text>
    <path d="M180,290 L280,290" class="connector-line" marker-end="url(#arrowhead)"/>

    <!-- CRM Box 4: Conversion -->
    <rect x="20" y="370" width="160" height="80" rx="5" ry="5" class="crm-box-bg"/>
    <rect x="20" y="370" width="160" height="80" rx="5" ry="5" class="crm-box"/>
    <text x="100" y="390" text-anchor="middle" class="crm-box-title">Account and Contact</text>
    <text x="100" y="410" text-anchor="middle" class="crm-box-content">Opportunity Status: Closed Won</text>
    <text x="100" y="425" text-anchor="middle" class="crm-box-content">Customer Type, Onboarding Status</text>
    <text x="100" y="440" text-anchor="middle" class="crm-box-content">Contract Details</text>
    <path d="M180,410 L340,410" class="connector-line" marker-end="url(#arrowhead)"/>

    <!-- CRM Box 5: Advocacy -->
    <rect x="20" y="490" width="160" height="80" rx="5" ry="5" class="crm-box-bg"/>
    <rect x="20" y="490" width="160" height="80" rx="5" ry="5" class="crm-box"/>
    <text x="100" y="510" text-anchor="middle" class="crm-box-title">Customer Success</text>
    <text x="100" y="530" text-anchor="middle" class="crm-box-content">Case Management, NPS Score</text>
    <text x="100" y="545" text-anchor="middle" class="crm-box-content">Renewals, Upsell Opportunities</text>
    <text x="100" y="560" text-anchor="middle" class="crm-box-content">Referral Program Status</text>
    <path d="M180,530 L380,530" class="connector-line" marker-end="url(#arrowhead)"/>

    <!-- Post-Funnel Loop (Customer Loyalty & Expansion) -->
    <g transform="translate(450, 600)">
        <path d="M0,0 C150,0 150,100 0,100 C-150,100 -150,0 0,0"
              fill="none" stroke="#28a745" stroke-width="2" stroke-dasharray="5,5" />
        <path d="M0,0 L-10,5 L-5,-5 Z" fill="#28a745" transform="translate(0, 50) rotate(180)" />
        <text x="0" y="50" text-anchor="middle" class="funnel-text-label" fill="#28a745" transform="rotate(-90 0 50)">CUSTOMER LIFECYCLE MANAGEMENT</text>
    </g>
    <path d="M400,580 L450,600" class="connector-line" stroke="#28a745" marker-end="url(#arrowhead)"/>


    <!-- Legend -->
    <g transform="translate(20, 680)">
      <text x="0" y="0" class="text-large">Legend:</text>
      <rect x="0" y="20" width="20" height="15" rx="3" ry="3" class="legend-box funnel-awareness"/>
      <text x="30" y="32" class="legend-text">Awareness and Discovery (TOFU)</text>

      <rect x="0" y="45" width="20" height="15" rx="3" ry="3" class="legend-box funnel-lead"/>
      <text x="30" y="57" class="legend-text">Lead Generation and Nurturing (MOFU)</text>

      <rect x="0" y="70" width="20" height="15" rx="3" ry="3" class="legend-box funnel-opportunity"/>
      <text x="30" y="82" class="legend-text">Opportunity Management (MOFU/BOFU)</text>

      <rect x="0" y="95" width="20" height="15" rx="3" ry="3" class="legend-box funnel-customer"/>
      <text x="30" y="107" class="legend-text">Conversion and Closure (BOFU)</text>

      <rect x="0" y="120" width="20" height="15" rx="3" ry="3" class="legend-box funnel-advocacy"/>
      <text x="30" y="132" class="legend-text">Retention and Advocacy (Post-Funnel)</text>
    </g>

    <g transform="translate(300, 680)">
      <rect x="0" y="20" width="20" height="15" rx="3" ry="3" class="crm-box"/>
      <text x="30" y="32" class="legend-text">CRM Integration Point (Example)</text>
    </g>

    <g transform="translate(300, 720)">
      <path d="M0,7.5 L20,7.5" class="connector-line"/>
      <polygon points="10 0, 20 7.5, 10 15" class="arrow-head" transform="translate(10,0)"/>
      <text x="30" y="20" class="legend-text">Funnel Flow / CRM Data Flow</text>
    </g>

  </g>
</svg>

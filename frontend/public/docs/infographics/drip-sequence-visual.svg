<svg width="900" height="650" viewBox="0 0 900 650" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="50" font-size="30" font-weight="bold" fill="#333" text-anchor="middle">Drip Sequence Workflow</text>
  <text x="450" y="85" font-size="18" fill="#666" text-anchor="middle">Automated Customer Journey with CRM Integration</text>

  <!-- CRM Context Tag -->
  <rect x="700" y="20" width="180" height="40" rx="5" fill="#e0f2f7" stroke="#03A9F4" stroke-width="1"/>
  <text x="790" y="45" font-size="16" font-weight="bold" fill="#03A9F4" text-anchor="middle">CRM Powered</text>

  <!-- Sequence Elements -->
  <g transform="translate(0, 70)">
    <!-- Start Node -->
    <rect id="start" x="360" y="100" width="180" height="60" rx="10" fill="#4CAF50" stroke="#388E3C" stroke-width="2"/>
    <text x="450" y="135" font-size="18" font-weight="bold" fill="#FFF" text-anchor="middle">Trigger: New Lead</text>

    <!-- Arrow 1 -->
    <line x1="450" y1="160" x2="450" y2="190" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- Action 1 Node -->
    <rect id="action1" x="330" y="200" width="240" height="80" rx="10" fill="#2196F3" stroke="#1976D2" stroke-width="2"/>
    <text x="450" y="235" font-size="18" font-weight="bold" fill="#FFF" text-anchor="middle">Email 1: Welcome & Intro</text>
    <text x="450" y="258" font-size="14" fill="#E0F2F7" text-anchor="middle">(Automated via CRM)</text>

    <!-- Arrow 2 with Delay -->
    <line x1="450" y1="280" x2="450" y2="310" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="400" y="285" width="100" height="25" rx="5" fill="#FFC107" stroke="#FFA000" stroke-width="1"/>
    <text x="450" y="303" font-size="14" fill="#FFF" text-anchor="middle">Wait 3 Days</text>

    <!-- Action 2 Node -->
    <rect id="action2" x="330" y="320" width="240" height="80" rx="10" fill="#2196F3" stroke="#1976D2" stroke-width="2"/>
    <text x="450" y="355" font-size="18" font-weight="bold" fill="#FFF" text-anchor="middle">Email 2: Product Benefits</text>
    <text x="450" y="378" font-size="14" fill="#E0F2F7" text-anchor="middle">(Automated via CRM)</text>

    <!-- Arrow 3 with Delay -->
    <line x1="450" y1="400" x2="450" y2="430" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="400" y="405" width="100" height="25" rx="5" fill="#FFC107" stroke="#FFA000" stroke-width="1"/>
    <text x="450" y="423" font-size="14" fill="#FFF" text-anchor="middle">Wait 5 Days</text>

    <!-- Action 3 Node -->
    <rect id="action3" x="330" y="440" width="240" height="80" rx="10" fill="#2196F3" stroke="#1976D2" stroke-width="2"/>
    <text x="450" y="470" font-size="18" font-weight="bold" fill="#FFF" text-anchor="middle">CRM Task: Follow-up Call</text>
    <text x="450" y="493" font-size="14" fill="#E0F2F7" text-anchor="middle">(Assigned to Sales Rep)</text>

    <!-- Arrow 4 -->
    <line x1="450" y1="520" x2="450" y2="550" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- End Node -->
    <rect id="end" x="360" y="560" width="180" height="60" rx="10" fill="#757575" stroke="#616161" stroke-width="2"/>
    <text x="450" y="595" font-size="18" font-weight="bold" fill="#FFF" text-anchor="middle">Sequence Ends</text>
  </g>
</svg>
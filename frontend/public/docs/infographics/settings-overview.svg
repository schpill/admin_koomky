<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" font-family="Arial, sans-serif">
  <defs>
    <!-- Card Style -->
    <style>
      .card-rect {
        fill: #fdfdfd;
        stroke: #e0e0e0;
        stroke-width: 1;
        rx: 10;
        ry: 10;
        filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.05));
      }
      .card-title {
        fill: #333333;
        font-size: 18px;
        font-weight: bold;
        text-anchor: middle;
      }
      .card-icon {
        fill: #673ab7; /* Deep Purple */
      }
      .card-subtitle {
        fill: #777777;
        font-size: 14px;
        text-anchor: middle;
      }
    </style>

    <!-- Icon Definitions (Material Design inspired paths) -->
    <symbol id="icon-profile" viewBox="0 0 24 24">
      <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
    </symbol>
    <symbol id="icon-business" viewBox="0 0 24 24">
      <path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-2 .89-2 2v10c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/>
    </symbol>
    <symbol id="icon-email" viewBox="0 0 24 24">
      <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
    </symbol>
    <symbol id="icon-security" viewBox="0 0 24 24">
      <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3-8H9V6c0-1.66 1.34-3 3-3s3 1.34 3 3v2z"/>
    </symbol>
    <symbol id="icon-webhooks" viewBox="0 0 24 24">
      <path d="M11 15H6l7-12v9h5l-7 12z"/>
    </symbol>
    <symbol id="icon-automations" viewBox="0 0 24 24">
      <path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.5.44l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.22-.09-.49 0-.61.22l-2 3.46c-.12.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.04.26.25.44.5.44h4c.25 0 .46-.18.5-.44l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.22.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/>
    </symbol>
  </defs>

  <!-- Title for the infographic -->
  <text x="400" y="40" class="card-title" font-size="24px" fill="#333" text-anchor="middle">Freelance CRM Settings</text>

  <!-- Card Layout (3 columns, 2 rows) -->
  <!-- Row 1 -->
  <g transform="translate(50, 80)">
    <rect width="200" height="130" class="card-rect"/>
    <use xlink:href="#icon-profile" x="76" y="20" width="48" height="48" class="card-icon"/>
    <text x="100" y="95" class="card-title">Profile</text>
  </g>

  <g transform="translate(300, 80)">
    <rect width="200" height="130" class="card-rect"/>
    <use xlink:href="#icon-business" x="76" y="20" width="48" height="48" class="card-icon"/>
    <text x="100" y="95" class="card-title">Business</text>
  </g>

  <g transform="translate(550, 80)">
    <rect width="200" height="130" class="card-rect"/>
    <use xlink:href="#icon-email" x="76" y="20" width="48" height="48" class="card-icon"/>
    <text x="100" y="95" class="card-title">Email (SES)</text>
  </g>

  <!-- Row 2 -->
  <g transform="translate(50, 310)">
    <rect width="200" height="130" class="card-rect"/>
    <use xlink:href="#icon-security" x="76" y="20" width="48" height="48" class="card-icon"/>
    <text x="100" y="95" class="card-title">Security</text>
    <text x="100" y="115" class="card-subtitle">(2FA + API tokens)</text>
  </g>

  <g transform="translate(300, 310)">
    <rect width="200" height="130" class="card-rect"/>
    <use xlink:href="#icon-webhooks" x="76" y="20" width="48" height="48" class="card-icon"/>
    <text x="100" y="95" class="card-title">Webhooks</text>
  </g>

  <g transform="translate(550, 310)">
    <rect width="200" height="130" class="card-rect"/>
    <use xlink:href="#icon-automations" x="76" y="20" width="48" height="48" class="card-icon"/>
    <text x="100" y="95" class="card-title">Automations</text>
    <text x="100" y="115" class="card-subtitle">(Scoring, Warmup, Reminders)</text>
  </g>

</svg>
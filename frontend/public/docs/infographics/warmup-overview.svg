<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <title>IP Warm-up Progression</title>
  <desc>Bar chart showing daily email quota increasing from 50 to 5000 over 30 days, with a color gradient from yellow to green.</desc>

  <style>
    .title { font: bold 24px sans-serif; text-anchor: middle; }
    .axis-label { font: 14px sans-serif; text-anchor: middle; fill: #333; }
    .y-axis-label { font: 12px sans-serif; text-anchor: end; fill: #333; }
    .x-axis-label { font: 12px sans-serif; text-anchor: middle; fill: #333; }
    .axis-line { stroke: #333; stroke-width: 1; }
  </style>

  <!-- Chart Title -->
  <text x="400" y="40" class="title">IP Warm-up Progression</text>

  <!-- Y-Axis (Quota) -->
  <!-- Axis line -->
  <line x1="80" y1="70" x2="80" y2="450" class="axis-line" />
  <!-- Axis title -->
  <text x="40" y="260" class="axis-label" transform="rotate(-90 40 260)">Daily Email Quota</text>
  
  <!-- Y-axis ticks and labels -->
  <!-- Scale: 380px (plot height) / 5000 (max quota) = 0.076px/unit -->
  <!-- y_pos = 450 (y_end) - (value * 0.076) -->
  <g class="y-axis-labels">
    <line x1="75" y1="450" x2="80" y2="450" class="axis-line" /><text x="70" y="450" dy="0.3em" class="y-axis-label">0</text>
    <line x1="75" y1="374" x2="80" y2="374" class="axis-line" /><text x="70" y="374" dy="0.3em" class="y-axis-label">1000</text>
    <line x1="75" y1="298" x2="80" y2="298" class="axis-line" /><text x="70" y="298" dy="0.3em" class="y-axis-label">2000</text>
    <line x1="75" y1="222" x2="80" y2="222" class="axis-line" /><text x="70" y="222" dy="0.3em" class="y-axis-label">3000</text>
    <line x1="75" y1="146" x2="80" y2="146" class="axis-line" /><text x="70" y="146" dy="0.3em" class="y-axis-label">4000</text>
    <line x1="75" y1="70" x2="80" y2="70" class="axis-line" /><text x="70" y="70" dy="0.3em" class="y-axis-label">5000</text>
  </g>

  <!-- X-Axis (Days) -->
  <!-- Axis line -->
  <line x1="80" y1="450" x2="780" y2="450" class="axis-line" />
  <!-- Axis title -->
  <text x="430" y="480" class="axis-label">Day</text>

  <!-- Bars for Days 1-30 -->
  <!-- Plotting area: x_start=80, y_end=450, plot_width=700, plot_height=380 -->
  <!-- Bar width: 20px, Slot width: 700/30 = 23.33px, Slot inner offset: 1.67px -->
  <!-- Quota progression: Linear from 50 (Day 1) to 5000 (Day 30) -->
  <!-- Color gradient: Yellow (rgb(255,255,0)) to Green (rgb(0,128,0)) based on quota -->
  <g class="bars">
    <rect x="81.67" y="446.20" width="20" height="3.80" fill="rgb(255,255,0)" stroke="#333" stroke-width="0.5" />
    <rect x="105.00" y="443.46" width="20" height="6.54" fill="rgb(246,249,0)" stroke="#333" stroke-width="0.5" />
    <rect x="128.33" y="440.72" width="20" height="9.28" fill="rgb(238,244,0)" stroke="#333" stroke-width="0.5" />
    <rect x="151.67" y="437.98" width="20" height="12.02" fill="rgb(229,238,0)" stroke="#333" stroke-width="0.5" />
    <rect x="175.00" y="435.24" width="20" height="14.76" fill="rgb(221,232,0)" stroke="#333" stroke-width="0.5" />
    <rect x="198.33" y="432.50" width="20" height="17.50" fill="rgb(212,227,0)" stroke="#333" stroke-width="0.5" />
    <rect x="221.67" y="429.76" width="20" height="20.24" fill="rgb(204,221,0)" stroke="#333" stroke-width="0.5" />
    <rect x="245.00" y="427.02" width="20" height="22.98" fill="rgb(195,216,0)" stroke="#333" stroke-width="0.5" />
    <rect x="268.33" y="424.28" width="20" height="25.72" fill="rgb(187,210,0)" stroke="#333" stroke-width="0.5" />
    <rect x="291.67" y="421.54" width="20" height="28.46" fill="rgb(178,205,0)" stroke="#333" stroke-width="0.5" />
    <rect x="315.00" y="418.80" width="20" height="31.20" fill="rgb(170,199,0)" stroke="#333" stroke-width="0.5" />
    <rect x="338.33" y="416.06" width="20" height="33.94" fill="rgb(161,194,0)" stroke="#333" stroke-width="0.5" />
    <rect x="361.67" y="413.32" width="20" height="36.68" fill="rgb(153,188,0)" stroke="#333" stroke-width="0.5" />
    <rect x="385.00" y="410.58" width="20" height="39.42" fill="rgb(144,183,0)" stroke="#333" stroke-width="0.5" />
    <rect x="408.33" y="407.84" width="20" height="42.16" fill="rgb(136,177,0)" stroke="#333" stroke-width="0.5" />
    <rect x="431.67" y="405.10" width="20" height="44.90" fill="rgb(127,172,0)" stroke="#333" stroke-width="0.5" />
    <rect x="455.00" y="402.36" width="20" height="47.64" fill="rgb(119,166,0)" stroke="#333" stroke-width="0.5" />
    <rect x="478.33" y="399.62" width="20" height="50.38" fill="rgb(110,161,0)" stroke="#333" stroke-width="0.5" />
    <rect x="501.67" y="396.88" width="20" height="53.12" fill="rgb(102,155,0)" stroke="#333" stroke-width="0.5" />
    <rect x="525.00" y="394.14" width="20" height="55.86" fill="rgb(93,150,0)" stroke="#333" stroke-width="0.5" />
    <rect x="548.33" y="391.40" width="20" height="58.60" fill="rgb(85,144,0)" stroke="#333" stroke-width="0.5" />
    <rect x="571.67" y="388.66" width="20" height="61.34" fill="rgb(76,139,0)" stroke="#333" stroke-width="0.5" />
    <rect x="595.00" y="385.92" width="20" height="64.08" fill="rgb(68,133,0)" stroke="#333" stroke-width="0.5" />
    <rect x="618.33" y="383.18" width="20" height="66.82" fill="rgb(59,128,0)" stroke="#333" stroke-width="0.5" />
    <rect x="641.67" y="380.44" width="20" height="69.56" fill="rgb(51,122,0)" stroke="#333" stroke-width="0.5" />
    <rect x="665.00" y="377.70" width="20" height="72.30" fill="rgb(42,117,0)" stroke="#333" stroke-width="0.5" />
    <rect x="688.33" y="374.96" width="20" height="75.04" fill="rgb(34,111,0)" stroke="#333" stroke-width="0.5" />
    <rect x="711.67" y="372.22" width="20" height="77.78" fill="rgb(25,106,0)" stroke="#333" stroke-width="0.5" />
    <rect x="735.00" y="369.48" width="20" height="80.52" fill="rgb(17,100,0)" stroke="#333" stroke-width="0.5" />
    <rect x="758.33" y="70.00" width="20" height="380.00" fill="rgb(0,128,0)" stroke="#333" stroke-width="0.5" />
  </g>

  <!-- X-axis ticks and labels -->
  <!-- Label positions are centered within their slot width for better alignment -->
  <g class="x-axis-labels">
    <!-- Day 1 (i=0) -->
    <line x1="91.67" y1="450" x2="91.67" y2="455" class="axis-line" />
    <text x="91.67" y="465" class="x-axis-label">1</text>
    <!-- Day 5 (i=4) -->
    <line x1="185.00" y1="450" x2="185.00" y2="455" class="axis-line" />
    <text x="185.00" y="465" class="x-axis-label">5</text>
    <!-- Day 10 (i=9) -->
    <line x1="301.66" y1="450" x2="301.66" y2="455" class="axis-line" />
    <text x="301.66" y="465" class="x-axis-label">10</text>
    <!-- Day 15 (i=14) -->
    <line x1="418.33" y1="450" x2="418.33" y2="455" class="axis-line" />
    <text x="418.33" y="465" class="x-axis-label">15</text>
    <!-- Day 20 (i=19) -->
    <line x1="535.00" y1="450" x2="535.00" y2="455" class="axis-line" />
    <text x="535.00" y="465" class="x-axis-label">20</text>
    <!-- Day 25 (i=24) -->
    <line x1="651.66" y1="450" x2="651.66" y2="455" class="axis-line" />
    <text x="651.66" y="465" class="x-axis-label">25</text>
    <!-- Day 30 (i=29) -->
    <line x1="768.32" y1="450" x2="768.32" y2="455" class="axis-line" />
    <text x="768.32" y="465" class="x-axis-label">30</text>
  </g>
</svg>
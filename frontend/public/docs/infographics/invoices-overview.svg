<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .invoice-bg { fill: white; stroke: #ccc; stroke-width: 1; }
      .header-title { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 24px; font-weight: bold; fill: #333; }
      .header-logo-text { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 16px; font-weight: bold; fill: #fff; }
      .company-name { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 20px; font-weight: bold; fill: #333; }
      .company-tagline { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 13px; fill: #555; }
      .invoice-meta-label { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 13px; font-weight: bold; fill: #666; }
      .invoice-meta-value { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 13px; fill: #333; }
      .section-heading { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 14px; font-weight: bold; fill: #666; }
      .client-info { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 12px; fill: #333; }
      .table-header { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 12px; font-weight: bold; fill: #333; }
      .table-row { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 12px; fill: #333; }
      .summary-label { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 13px; font-weight: bold; fill: #555; }
      .summary-value { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 13px; fill: #333; text-anchor: end; }
      .grand-total-label { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 16px; font-weight: bold; fill: #000; }
      .grand-total-value { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 16px; font-weight: bold; fill: #000; text-anchor: end; }
      .footer-label { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 11px; font-weight: bold; fill: #666; }
      .footer-value { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 11px; fill: #333; }
      .line { stroke: #eee; stroke-width: 1; }
    </style>
  </defs>

  <!-- Main Invoice "Paper" Background -->
  <rect x="100" y="50" width="600" height="400" rx="5" ry="5" class="invoice-bg"/>

  <!-- Header Section -->
  <!-- Logo Placeholder -->
  <rect x="120" y="70" width="40" height="40" fill="#2E86C1" rx="5" ry="5"/>
  <text x="140" y="95" class="header-logo-text" text-anchor="middle">LOGO</text>
  
  <text x="170" y="85" class="company-name">Freelancer Name</text>
  <text x="170" y="105" class="company-tagline">Professional Services &amp; Consulting</text>

  <text x="680" y="70" class="header-title" text-anchor="end">INVOICE</text>
  <text x="680" y="90" class="invoice-meta-label" text-anchor="end">Date: <tspan class="invoice-meta-value">2023-10-27</tspan></text>
  <text x="680" y="110" class="invoice-meta-label" text-anchor="end">Invoice #: <tspan class="invoice-meta-value">INV-2023-001</tspan></text>

  <!-- Client Info Section -->
  <text x="120" y="150" class="section-heading">BILL TO:</text>
  <text x="120" y="170" class="client-info">Client Company Name</text>
  <text x="120" y="185" class="client-info">123 Client Street</text>
  <text x="120" y="200" class="client-info">Client City, PC 12345</text>

  <!-- Line Items Table Header -->
  <text x="120" y="235" class="table-header">DESCRIPTION</text>
  <text x="450" y="235" class="table-header" text-anchor="end">QTY</text>
  <text x="520" y="235" class="table-header" text-anchor="end">UNIT PRICE</text>
  <text x="680" y="235" class="table-header" text-anchor="end">TOTAL</text>
  <line x1="120" y1="245" x2="680" y2="245" class="line"/>

  <!-- Line Items Table Rows -->
  <text x="120" y="265" class="table-row">Website Design Project</text>
  <text x="450" y="265" class="table-row" text-anchor="end">1</text>
  <text x="520" y="265" class="table-row" text-anchor="end">$1,000.00</text>
  <text x="680" y="265" class="table-row" text-anchor="end">$1,000.00</text>

  <text x="120" y="285" class="table-row">Content Creation (5 articles)</text>
  <text x="450" y="285" class="table-row" text-anchor="end">5</text>
  <text x="520" y="285" class="table-row" text-anchor="end">$100.00</text>
  <text x="680" y="285" class="table-row" text-anchor="end">$500.00</text>
  
  <text x="120" y="305" class="table-row">Consultation Hours</text>
  <text x="450" y="305" class="table-row" text-anchor="end">2</text>
  <text x="520" y="305" class="table-row" text-anchor="end">$75.00</text>
  <text x="680" y="305" class="table-row" text-anchor="end">$150.00</text>
  
  <line x1="120" y1="315" x2="680" y2="315" class="line"/>

  <!-- Summary Section -->
  <text x="580" y="335" class="summary-label">Subtotal:</text>
  <text x="680" y="335" class="summary-value">$1,650.00</text>

  <text x="580" y="355" class="summary-label">Tax (10%):</text>
  <text x="680" y="355" class="summary-value">$165.00</text>
  
  <line x1="550" y1="365" x2="680" y2="365" class="line"/>

  <text x="580" y="385" class="grand-total-label">GRAND TOTAL:</text>
  <text x="680" y="385" class="grand-total-value">$1,815.00</text>

  <!-- Payment Terms & Bank Details Footer -->
  <text x="120" y="390" class="footer-label">PAYMENT TERMS:</text>
  <text x="120" y="405" class="footer-value">Net 30 days. Please make payment within 30 days of this invoice.</text>

  <text x="120" y="425" class="footer-label">BANK DETAILS:</text>
  <text x="120" y="440" class="footer-value">Account Name: Freelancer Name</text>
  <text x="120" y="455" class="footer-value">Account Number: 1234567890</text>
  <text x="120" y="470" class="footer-value">Bank Name: Your Bank Plc</text>
  <text x="120" y="485" class="footer-value">SWIFT/BIC: ABCD1234567</text>
</svg>
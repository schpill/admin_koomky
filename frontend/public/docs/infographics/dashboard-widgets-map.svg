<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <style>
      .dashboard-border { fill: #f2f5f7; stroke: #d9e2ec; stroke-width: 2px; }
      .dashboard-title { font-size: 24px; font-weight: bold; fill: #333; }
      .crm-hub-box { fill: #4CAF50; stroke: #388E3C; stroke-width: 1.5px; }
      .crm-hub-text { font-size: 18px; font-weight: bold; fill: #FFFFFF; }
      .widget-box { fill: #2196F3; stroke: #1976D2; stroke-width: 1.5px; }
      .widget-text { font-size: 16px; font-weight: bold; fill: #FFFFFF; }
      .connection-line { stroke: #607D8B; stroke-width: 2px; }
      .connection-arrow { fill: #607D8B; }
      .sub-widget-box { fill: #BBDEFB; stroke: #90CAF9; stroke-width: 1px; }
      .sub-widget-text { font-size: 12px; fill: #333; }
      .widget-group-label { font-size: 14px; font-weight: bold; fill: #607D8B; }
    </style>

    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="connection-arrow" />
    </marker>
  </defs>

  <!-- Dashboard Container -->
  <rect x="50" y="50" width="700" height="500" rx="15" ry="15" class="dashboard-border" />
  <text x="75" y="85" class="dashboard-title">CRM Dashboard Widgets Map</text>

  <!-- CRM Data Hub (Central Node) -->
  <rect x="300" y="270" width="200" height="60" rx="10" ry="10" class="crm-hub-box" />
  <text x="400" y="307" text-anchor="middle" class="crm-hub-text">CRM Data Hub</text>

  <!-- Widget Group 1: Sales & Marketing -->
  <text x="175" y="150" text-anchor="middle" class="widget-group-label">Sales &amp; Marketing</text>
  <rect x="100" y="170" width="150" height="40" rx="8" ry="8" class="widget-box" />
  <text x="175" y="195" text-anchor="middle" class="widget-text">Sales Pipeline</text>

  <rect x="100" y="230" width="150" height="40" rx="8" ry="8" class="widget-box" />
  <text x="175" y="255" text-anchor="middle" class="widget-text">Lead Conversion</text>

  <rect x="100" y="290" width="150" height="40" rx="8" ry="8" class="widget-box" />
  <text x="175" y="315" text-anchor="middle" class="widget-text">Campaign ROI</text>

  <!-- Widget Group 2: Customer Service -->
  <text x="625" y="150" text-anchor="middle" class="widget-group-label">Customer Service</text>
  <rect x="550" y="170" width="150" height="40" rx="8" ry="8" class="widget-box" />
  <text x="625" y="195" text-anchor="middle" class="widget-text">Support Tickets</text>

  <rect x="550" y="230" width="150" height="40" rx="8" ry="8" class="widget-box" />
  <text x="625" y="255" text-anchor="middle" class="widget-text">CSAT Score</text>

  <!-- Widget Group 3: Customer Insights -->
  <text x="300" y="370" text-anchor="start" class="widget-group-label">Customer Insights</text>
  <rect x="220" y="400" width="150" height="40" rx="8" ry="8" class="widget-box" />
  <text x="295" y="425" text-anchor="middle" class="widget-text">Customer Churn</text>

  <rect x="220" y="460" width="150" height="40" rx="8" ry="8" class="widget-box" />
  <text x="295" y="485" text-anchor="middle" class="widget-text">Lifetime Value</text>

  <!-- Widget Group 4: Performance & Forecast -->
  <text x="500" y="370" text-anchor="end" class="widget-group-label">Performance &amp; Forecast</text>
  <rect x="430" y="400" width="150" height="40" rx="8" ry="8" class="widget-box" />
  <text x="505" y="425" text-anchor="middle" class="widget-text">Revenue Forecast</text>

  <rect x="430" y="460" width="150" height="40" rx="8" ry="8" class="widget-box" />
  <text x="505" y="485" text-anchor="middle" class="widget-text">Activity Log</text>

  <!-- Connections from CRM Data Hub to Widgets -->
  <line x1="300" y1="290" x2="250" y2="190" class="connection-line" marker-end="url(#arrowhead)" />
  <line x1="300" y1="295" x2="250" y2="250" class="connection-line" marker-end="url(#arrowhead)" />
  <line x1="300" y1="300" x2="250" y2="310" class="connection-line" marker-end="url(#arrowhead)" />

  <line x1="500" y1="290" x2="550" y2="190" class="connection-line" marker-end="url(#arrowhead)" />
  <line x1="500" y1="295" x2="550" y2="250" class="connection-line" marker-end="url(#arrowhead)" />

  <line x1="370" y1="330" x2="295" y2="400" class="connection-line" marker-end="url(#arrowhead)" />
  <line x1="370" y1="330" x2="295" y2="460" class="connection-line" marker-end="url(#arrowhead)" />

  <line x1="430" y1="330" x2="505" y2="400" class="connection-line" marker-end="url(#arrowhead)" />
  <line x1="430" y1="330" x2="505" y2="460" class="connection-line" marker-end="url(#arrowhead)" />

  <!-- Sub-widgets/details for Sales Pipeline -->
  <rect x="80" y="175" width="10" height="30" rx="3" ry="3" fill="#64B5F6" />
  <rect x="80" y="235" width="10" height="30" rx="3" ry="3" fill="#64B5F6" />
  <rect x="80" y="295" width="10" height="30" rx="3" ry="3" fill="#64B5F6" />

  <rect x="690" y="175" width="10" height="30" rx="3" ry="3" fill="#64B5F6" />
  <rect x="690" y="235" width="10" height="30" rx="3" ry="3" fill="#64B5F6" />

  <rect x="210" y="405" width="10" height="30" rx="3" ry="3" fill="#64B5F6" />
  <rect x="210" y="465" width="10" height="30" rx="3" ry="3" fill="#64B5F6" />

  <rect x="580" y="405" width="10" height="30" rx="3" ry="3" fill="#64B5F6" />
  <rect x="580" y="465" width="10" height="30" rx="3" ry="3" fill="#64B5F6" />

</svg>
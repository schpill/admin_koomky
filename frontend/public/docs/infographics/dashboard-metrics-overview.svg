<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background of the dashboard -->
  <rect x="0" y="0" width="800" height="600" fill="#F8F9FA"/>

  <!-- Dashboard Title -->
  <text x="40" y="50" font-size="28" font-weight="bold" fill="#343A40">CRM Dashboard Overview</text>
  <line x1="40" y1="65" x2="760" y2="65" stroke="#E9ECEF" stroke-width="2"/>

  <!-- Card Layout: 2 rows, 3 columns (top row) and 2 columns (bottom row) -->

  <!-- Card 1: Total Revenue -->
  <g transform="translate(40, 90)">
    <rect x="0" y="0" width="220" height="180" rx="8" ry="8" fill="#FFFFFF" stroke="#E9ECEF" stroke-width="1"/>
    <text x="15" y="40" font-size="18" fill="#6C757D">Total Revenue</text>
    <text x="15" y="95" font-size="38" font-weight="bold" fill="#343A40">$1.23M</text>
    <text x="15" y="125" font-size="14" fill="#28A745">+5.2% vs last month</text>
    <!-- Simple trend line -->
    <polyline points="150,110 160,105 170,115 180,100 190,108 200,95" fill="none" stroke="#007BFF" stroke-width="2"/>
  </g>

  <!-- Card 2: New Leads -->
  <g transform="translate(290, 90)">
    <rect x="0" y="0" width="220" height="180" rx="8" ry="8" fill="#FFFFFF" stroke="#E9ECEF" stroke-width="1"/>
    <text x="15" y="40" font-size="18" fill="#6C757D">New Leads</text>
    <text x="15" y="95" font-size="38" font-weight="bold" fill="#343A40">850</text>
    <text x="15" y="125" font-size="14" fill="#28A745">+12% vs last week</text>
    <!-- Small bar chart for leads -->
    <rect x="150" y="120" width="15" height="40" fill="#007BFF" rx="2"/>
    <rect x="170" y="110" width="15" height="50" fill="#007BFF" rx="2"/>
    <rect x="190" y="130" width="15" height="30" fill="#007BFF" rx="2"/>
  </g>

  <!-- Card 3: Customer Satisfaction -->
  <g transform="translate(540, 90)">
    <rect x="0" y="0" width="220" height="180" rx="8" ry="8" fill="#FFFFFF" stroke="#E9ECEF" stroke-width="1"/>
    <text x="15" y="40" font-size="18" fill="#6C757D">CSAT Score</text>
    <text x="15" y="95" font-size="38" font-weight="bold" fill="#343A40">92%</text>
    <text x="15" y="125" font-size="14" fill="#28A745">Excellent rating</text>
    <!-- Donut chart -->
    <circle cx="170" cy="95" r="35" fill="none" stroke="#E9ECEF" stroke-width="10"/>
    <!-- 92% of 2*PI*35 = 202.31, circumference is 219.91 -->
    <circle cx="170" cy="95" r="35" fill="none" stroke="#007BFF" stroke-width="10"
            stroke-dasharray="202.31 219.91" stroke-linecap="round"
            transform="rotate(-90 170 95)"/>
  </g>

  <!-- Card 4: Sales Pipeline Value -->
  <g transform="translate(40, 300)">
    <rect x="0" y="0" width="345" height="260" rx="8" ry="8" fill="#FFFFFF" stroke="#E9ECEF" stroke-width="1"/>
    <text x="15" y="40" font-size="18" fill="#6C757D">Sales Pipeline Value</text>
    <text x="15" y="95" font-size="38" font-weight="bold" fill="#343A40">$3.45M</text>
    <text x="15" y="125" font-size="14" fill="#28A745">+15% vs last month</text>
    <!-- Bar chart for pipeline stages -->
    <g transform="translate(15, 140)">
      <text x="0" y="15" font-size="12" fill="#6C757D">Prospecting</text>
      <rect x="80" y="5" width="200" height="15" fill="#17A2B8" rx="4"/>
      <text x="290" y="15" font-size="12" fill="#343A40">$0.8M</text>

      <text x="0" y="45" font-size="12" fill="#6C757D">Qualification</text>
      <rect x="80" y="35" width="160" height="15" fill="#007BFF" rx="4"/>
      <text x="250" y="45" font-size="12" fill="#343A40">$0.6M</text>

      <text x="0" y="75" font-size="12" fill="#6C757D">Proposal</text>
      <rect x="80" y="65" width="250" height="15" fill="#FFC107" rx="4"/>
      <text x="340" y="75" font-size="12" fill="#343A40">$1.2M</text>

      <text x="0" y="105" font-size="12" fill="#6C757D">Negotiation</text>
      <rect x="80" y="95" width="180" height="15" fill="#28A745" rx="4"/>
      <text x="270" y="105" font-size="12" fill="#343A40">$0.85M</text>
    </g>
  </g>

  <!-- Card 5: Lead Conversion Rate -->
  <g transform="translate(415, 300)">
    <rect x="0" y="0" width="345" height="260" rx="8" ry="8" fill="#FFFFFF" stroke="#E9ECEF" stroke-width="1"/>
    <text x="15" y="40" font-size="18" fill="#6C757D">Lead Conversion Rate</text>
    <text x="15" y="95" font-size="38" font-weight="bold" fill="#343A40">18.5%</text>
    <text x="15" y="125" font-size="14" fill="#28A745">Steady growth</text>
    <!-- Line chart for conversion trend -->
    <g transform="translate(15, 140)">
      <line x1="0" y1="80" x2="315" y2="80" stroke="#E9ECEF"/>
      <line x1="0" y1="40" x2="315" y2="40" stroke="#E9ECEF" stroke-dasharray="2 2"/>
      <text x="0" y="85" font-size="10" fill="#6C757D">15%</text>
      <text x="0" y="45" font-size="10" fill="#6C757D">20%</text>

      <polyline points="20,75 70,68 120,60 170,55 220,50 270,45 300,42" fill="none" stroke="#007BFF" stroke-width="3" stroke-linecap="round"/>
      <circle cx="20" cy="75" r="4" fill="#007BFF"/>
      <circle cx="70" cy="68" r="4" fill="#007BFF"/>
      <circle cx="120" cy="60" r="4" fill="#007BFF"/>
      <circle cx="170" cy="55" r="4" fill="#007BFF"/>
      <circle cx="220" cy="50" r="4" fill="#007BFF"/>
      <circle cx="270" cy="45" r="4" fill="#007BFF"/>
      <circle cx="300" cy="42" r="4" fill="#007BFF"/>
      <text x="20" y="95" text-anchor="middle" font-size="10" fill="#6C757D">Jan</text>
      <text x="70" y="95" text-anchor="middle" font-size="10" fill="#6C757D">Feb</text>
      <text x="120" y="95" text-anchor="middle" font-size="10" fill="#6C757D">Mar</text>
      <text x="170" y="95" text-anchor="middle" font-size="10" fill="#6C757D">Apr</text>
      <text x="220" y="95" text-anchor="middle" font-size="10" fill="#6C757D">May</text>
      <text x="270" y="95" text-anchor="middle" font-size="10" fill="#6C757D">Jun</text>
      <text x="300" y="95" text-anchor="middle" font-size="10" fill="#6C757D">Jul</text>
    </g>
  </g>

</svg>
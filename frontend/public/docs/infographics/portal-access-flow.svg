<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif" font-size="16">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-size="28" fill="#1A2B4D" font-weight="bold">Portal Access Flow</text>
  <text x="600" y="80" text-anchor="middle" font-size="20" fill="#555">Integration with CRM for User Management</text>

  <!-- Lane Headers -->
  <rect x="100" y="120" width="300" height="60" rx="10" fill="#1A2B4D"/>
  <text x="250" y="155" text-anchor="middle" font-size="20" fill="#FFF" font-weight="bold">User / Customer</text>

  <rect x="450" y="120" width="300" height="60" rx="10" fill="#1A2B4D"/>
  <text x="600" y="155" text-anchor="middle" font-size="20" fill="#FFF" font-weight="bold">Portal Application</text>

  <rect x="800" y="120" width="300" height="60" rx="10" fill="#1A2B4D"/>
  <text x="950" y="155" text-anchor="middle" font-size="20" fill="#FFF" font-weight="bold">CRM System</text>

  <!-- Vertical Lane Lines -->
  <line x1="250" y1="180" x2="250" y2="750" stroke="#DDD" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="600" y1="180" x2="600" y2="750" stroke="#DDD" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="950" y1="180" x2="950" y2="750" stroke="#DDD" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- Flow Steps -->

  <!-- Step 1: User Initiation -->
  <rect x="150" y="220" width="200" height="50" rx="8" fill="#E6F2FF" stroke="#A9D4FF"/>
  <text x="250" y="248" text-anchor="middle" font-size="14" fill="#333">User / Customer</text>

  <line x1="350" y1="245" x2="450" y2="245" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="400" y="235" text-anchor="middle" font-size="14" fill="#555">1. Access Portal URL / Invite</text>

  <!-- Step 2: Portal Login/Signup & User Submission -->
  <rect x="500" y="290" width="200" height="50" rx="8" fill="#E6F2FF" stroke="#A9D4FF"/>
  <text x="600" y="318" text-anchor="middle" font-size="14" fill="#333">Portal Login / Signup</text>

  <line x1="500" y1="315" x2="350" y2="315" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="425" y="305" text-anchor="middle" font-size="14" fill="#555">Displays Form</text>

  <rect x="150" y="350" width="200" height="50" rx="8" fill="#E6F2FF" stroke="#A9D4FF"/>
  <text x="250" y="378" text-anchor="middle" font-size="14" fill="#333">User / Customer</text>

  <line x1="350" y1="375" x2="500" y2="375" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="425" y="365" text-anchor="middle" font-size="14" fill="#555">2. Submits Credentials / Data</text>

  <!-- Step 3: Portal Queries CRM -->
  <rect x="500" y="420" width="200" height="50" rx="8" fill="#E6F2FF" stroke="#A9D4FF"/>
  <text x="600" y="448" text-anchor="middle" font-size="14" fill="#333">Portal Internal Logic</text>

  <line x1="700" y1="445" x2="800" y2="445" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="750" y="435" text-anchor="middle" font-size="14" fill="#555">3. Query CRM for Contact (Email)</text>

  <!-- Step 4: CRM Responds to Portal -->
  <rect x="850" y="420" width="200" height="50" rx="8" fill="#E6F2FF" stroke="#A9D4FF"/>
  <text x="950" y="448" text-anchor="middle" font-size="14" fill="#333">CRM System</text>

  <line x1="800" y1="480" x2="700" y2="480" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="750" y="490" text-anchor="middle" font-size="14" fill="#555">4. Returns Contact Data / Not Found</text>

  <!-- Step 5: Portal Updates/Creates CRM Contact -->
  <rect x="500" y="520" width="200" height="50" rx="8" fill="#E6F2FF" stroke="#A9D4FF"/>
  <text x="600" y="548" text-anchor="middle" font-size="14" fill="#333">Portal Internal Logic</text>

  <line x1="700" y1="545" x2="800" y2="545" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="750" y="535" text-anchor="middle" font-size="14" fill="#555">5. Create New Contact / Update Existing</text>

  <!-- Step 6: Portal Assigns Roles & Grants Access -->
  <rect x="500" y="600" width="200" height="50" rx="8" fill="#E6F2FF" stroke="#A9D4FF"/>
  <text x="600" y="628" text-anchor="middle" font-size="14" fill="#333">Portal Internal Logic</text>

  <line x1="500" y1="625" x2="350" y2="625" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="425" y="615" text-anchor="middle" font-size="14" fill="#555">6. Assign Roles, Grant Access</text>

  <!-- Step 7: User Accesses Portal Dashboard -->
  <rect x="150" y="680" width="200" height="50" rx="8" fill="#E6F2FF" stroke="#A9D4FF"/>
  <text x="250" y="708" text-anchor="middle" font-size="14" fill="#333">User / Customer</text>

  <line x1="350" y1="705" x2="500" y2="705" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="425" y="695" text-anchor="middle" font-size="14" fill="#555">7. Access Portal Dashboard</text>

  <rect x="500" y="680" width="200" height="50" rx="8" fill="#E6F2FF" stroke="#A9D4FF"/>
  <text x="600" y="708" text-anchor="middle" font-size="14" fill="#333">Portal Dashboard</text>

</svg>